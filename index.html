        <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Gledis - Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff1f2; color: #831843; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #fbcfe8; backdrop-filter: blur(10px); border-radius: 24px; }
        .pink-button { background-color: #f472b6; color: white; transition: all 0.3s; box-shadow: 0 4px 14px 0 rgba(244, 114, 182, 0.39); }
        .pink-button:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 border-b border-pink-200 bg-white shadow-sm mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-pink-500"><i class="fas fa-heart mr-2"></i>IELTS.GLEDIS</h1>
            <div class="text-[10px] uppercase font-bold text-pink-300" id="liveClock"></div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <div class="grid lg:grid-cols-3 gap-6">
            
            <div class="space-y-6">
                <div class="glass-card p-6 border-t-8 border-pink-400">
                    <h3 class="font-bold uppercase text-[10px] text-pink-500 mb-4 tracking-widest">Target Hari Ini</h3>
                    <div id="dailyTask" class="text-sm text-slate-700 leading-relaxed"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-6 shadow-xl">
                    <h3 class="text-lg font-bold text-pink-600 mb-4 flex items-center">
                        <i class="fas fa-pencil-alt mr-2"></i> Latihan Menulis / Bicara
                    </h3>
                    <textarea id="userInput" rows="8" class="w-full bg-pink-50 border border-pink-100 rounded-2xl p-4 text-pink-700 outline-none focus:ring-2 focus:ring-pink-300 mb-4" placeholder="Ketik jawabanmu di sini..."></textarea>
                    
                    <button onclick="getFeedback()" id="btnAksi" class="w-full pink-button font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> CEK SEKARANG
                    </button>

                    <div id="resultArea" class="mt-6 hidden border-t border-pink-100 pt-6">
                        <h4 class="text-[10px] font-bold uppercase text-pink-400 mb-3">Hasil Analisa Guru AI:</h4>
                        <div id="aiResponse" class="bg-white p-5 rounded-2xl text-slate-700 text-sm leading-relaxed border border-pink-50 whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API KEY (Disusun terpisah agar tidak mudah terbaca sistem GitHub)
        const p1 = "AIzaSyClSNTgqd6v";
        const p2 = "vTCJJhoj4EnezTh5nmCZ8h8";
        const KEY = p1 + p2;

        const roadmap = {
            "Monday": "<b>Senin: Listening</b><br>Dengerin podcast bahasa Inggris 10 menit aja.",
            "Tuesday": "<b>Selasa: Reading</b><br>Baca 1 berita luar negeri, cari 5 kata baru.",
            "Wednesday": "<b>Rabu: Writing (Surat)</b><br>Tulis surat pendek buat temen dalam B. Inggris.",
            "Thursday": "<b>Kamis: Speaking</b><br>Ngomong depan cermin: Kenalin diri kamu.",
            "Friday": "<b>Jumat: Writing (Essay)</b><br>Tulis opini: Kamu lebih suka HP atau Laptop?",
            "Saturday": "<b>Sabtu: Vocab</b><br>Cek lagi semua kata baru yang kamu dapet.",
            "Sunday": "<b>Minggu: Santai</b><br>Nonton film pake subtitle Inggris ya!"
        };

        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const d = new Date();
        document.getElementById('liveClock').innerText = d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('dailyTask').innerHTML = roadmap[days[d.getDay()]];

        async function getFeedback() {
            const input = document.getElementById('userInput').value;
            const resArea = document.getElementById('resultArea');
            const resDiv = document.getElementById('aiResponse');
            const btn = document.getElementById('btnAksi');

            if(!input) return alert("Ketik sesuatu dulu ya Gledis!");

            btn.disabled = true;
            btn.innerText = "Sabar ya, lagi dicek...";
            resArea.classList.remove('hidden');
            resDiv.innerHTML = "Guru AI lagi baca tulisanmu...";

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analisa tulisan IELTS General ini untuk pemula target 4.5. Berikan koreksi grammar dan contoh benarnya dalam Bahasa Indonesia: ${input}` }] }] })
                });

                const data = await response.json();
                resDiv.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resDiv.innerHTML = "Koneksi atau Kunci AI bermasalah. Coba refresh atau cek API Key kamu lagi.";
            } finally {
                btn.disabled = false;
                btn.innerText = "CEK SEKARANG";
            }
        }
    </script>
</body>
</html>
